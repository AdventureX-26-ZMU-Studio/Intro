main:
  push:
    - name: sync-check
      docker:
        image: alpine/git:latest
      stages:
        - script: |
            apk add --no-cache curl
            echo "=== GitHub sync check ==="
            GH_REPO="https://github.com/AdventureX-26-ZMU-Studio/Intro.git"
            GH_SHA=$(git ls-remote $GH_REPO refs/heads/main | awk '{print $1}')
            echo "GitHub: $GH_SHA"
            echo "CNB:    $CNB_COMMIT"
            if [ -z "$GH_SHA" ]; then
              echo "Failed to fetch GitHub"
              exit 0
            fi
            if [ "$GH_SHA" != "$CNB_COMMIT" ]; then
              BRANCH="sync/github-${GH_SHA:0:8}"
              if ! git ls-remote --exit-code origin "$BRANCH" > /dev/null 2>&1; then
                git config user.name "CNB Sync"
                git config user.email "sync@cnb.cool"
                git branch "$BRANCH" "$CNB_COMMIT"
                git push "https://cnb:$CNB_TOKEN@cnb.cool/$CNB_REPO_SLUG.git" "$BRANCH"
                echo "Created branch: $BRANCH"
              else
                echo "Branch $BRANCH already exists"
              fi
            else
              echo "Both in sync, skipped"
            fi
